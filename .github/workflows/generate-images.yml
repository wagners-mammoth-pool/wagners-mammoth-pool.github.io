name: Generate Image Lists

on:
  push:
    branches:
      - main

jobs:
  images:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate hero.json and gallery.json
        run: |
          python << 'EOF'
          import os
          import json

          EXTENSIONS = (".jpg", ".jpeg", ".png", ".webp", ".gif")

          def build_list(folder, output):
              files = sorted(
                  f for f in os.listdir(folder)
                  if f.lower().endswith(EXTENSIONS)
              )

              with open(output, "w") as f:
                  json.dump(files, f, indent=2)

          build_list("images/hero", "hero.json")
          build_list("images/gallery", "gallery.json")
          EOF

      - name: Commit updated lists
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add hero.json gallery.json

          git diff --cached --quiet || \
          git commit -m "Update image lists"

          git push



